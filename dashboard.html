<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillTrack | Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="profile-section">
        <label for="profileInput" class="upload-label">
          <img id="profileImage" src="assets/placeholder-profile.png" alt="Profile" />
          <span class="upload-icon">📤</span>
        </label>
        <input type="file" id="profileInput" accept="image/*" />
        <h3>Dharani</h3>
      </div>
      <div class="goal-list" id="goalList">
        <!-- JS fills this -->
      </div>
    </div>

    <!-- Main Content -->
    <div class="main" id="goalDetails">
      <div class="welcome-box">
        <h2>🎯 Welcome to Your Dashboard</h2>
        <p>Select any goal from the left to view topics and progress.</p>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
