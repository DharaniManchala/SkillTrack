<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Progress</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      height: 100vh;
      background-color: #f1f5ff;
      overflow-x: hidden;
    }

   .toggle-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      background: #2970ff;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      z-index: 99;
    }


    .sidebar {
      width: 240px;
      background-color: #ffffff;
      padding: 20px 15px;
      border-right: 1px solid #e0e0e0;
      box-shadow: 4px 0 12px rgba(0, 0, 0, 0.03);
      transition: transform 0.3s ease;
      z-index: 10;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
      position: absolute;
    }

    .sidebar h2 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #2c3e50;
      text-align: center;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      color: #333;
      cursor: pointer;
      transition: background 0.2s;
    }

    .nav-item:hover,
    .nav-item.active {
      background-color: #f0f4ff;
      font-weight: bold;
    }

    .main-content {
      flex: 1;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .heading-box {
      background-color: #2c5cc5;
      padding: 15px 25px;
      border-radius: 12px;
      color: white;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 30px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .card {
      background-color: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .card p {
      color: #333;
      margin-bottom: 10px;
      white-space: pre-line;
    }

    .progress-bar {
      height: 10px;
      border-radius: 10px;
      background-color: #d9d9d9;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar-fill {
      height: 100%;
      background-color: #3266c0;
      width: 0%;
      transition: width 0.5s ease-in-out;
    }

    .progress-text {
      text-align: right;
      font-weight: bold;
      color: #333;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100vh;
        background-color: #fff;
        z-index: 9;
      }
    }
  </style>
</head>
<body>

  <!-- Toggle Button -->
  <button class="toggle-btn" onclick="toggleSidebar()">☰</button>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Menu</h2>
    <div class="nav-item">🏠 Home</div>
    <div class="nav-item">📈 Progress</div>
    <div class="nav-item">🎯 Goals</div>
    <div class="nav-item">🗓️ Calendar</div>
    <div class="nav-item">📤 Daily Uploads</div>
    <div class="nav-item">🔥 Streaks</div>
    <div class="nav-item">⏱️ Pomodoro Timer</div>
    <div class="nav-item">👤 Profile</div>
    <div class="nav-item">🚪 Logout</div>
  </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="heading-box">Your Progress</div>

    <div class="card">
      <h2>Machine Learning</h2>
      <p>Regression</p>
      <div class="progress-bar">
        <div class="progress-bar-fill" style="width: 50%;"></div>
      </div>
      <div class="progress-text">50%</div>
    </div>

    <div class="card">
      <h2>MERN Stack</h2>
      <p>React.js</p>
      <div class="progress-bar">
        <div class="progress-bar-fill" style="width: 20%;"></div>
      </div>
      <div class="progress-text">20%</div>
    </div>

    <div class="card">
      <h2>GATE Exam</h2>
      <p>Mathematics<br>Algorithms<br>Computer Networks<br>Databases</p>
      <div class="progress-bar">
        <div class="progress-bar-fill" style="width: 75%;"></div>
      </div>
      <div class="progress-text">75%</div>
    </div>
  </div>

  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('hidden');
    }

  </script>
</body>
</html>
